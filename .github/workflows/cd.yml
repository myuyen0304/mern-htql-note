name: CD - Deploy

on:
  # Chạy sau khi CI thành công trên nhánh main
  workflow_run:
    workflows: ["CI - Lint & Build"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Chỉ deploy khi CI pass
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── OPTION A: Deploy Backend lên Render ──────────────────────
      # Render tự động deploy khi push lên main nếu bạn kết nối GitHub repo.
      # Nếu muốn trigger thủ công qua deploy hook:
      - name: Trigger Render deploy (Backend)
        if: ${{ vars.ENABLE_RENDER_DEPLOY == 'true' }}
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "Render deploy triggered"

      # ─── OPTION B: Deploy Frontend lên Vercel ─────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # Dùng URL backend thật trên production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy Frontend to Vercel
        working-directory: frontend
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

